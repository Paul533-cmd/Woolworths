<body>

    <!--Header Section (Navigation + Logo)--> 
   <header>

    <!-- Logo -->

        <img src="_images/woolworths_logo.png" alt="Woolworths Logo" class="logo" loading="lazy">
    </div>

    <nav>

        <ul class="nav-links">

            <li><a href="index.html">Home</a></li>

        </ul>

    <!-- Main content goes here -->
<main>

    <h1>Product Enquiries</h1>

    <p>
        Use the form below to enquire about Woolworths products,
        availability and estimated pricing.
    </p>

    <form id="enquiryForm">

    <label for="fullName">
        Full Name
    </label>

    <input type="text"
           id="fullName"
           name="fullName"
           required
           minlength="3"
           maxlength="50"
           placeholder="Enter your full name">

    <label for="email">
        Email Address
    </label>

    <input type="email"
           id="email"
           name="email"
           required
           placeholder="example@email.com">

    <label for="phone">
        Phone Number
    </label>

    <input type="tel"
           id="phone"
           name="phone"
           pattern="[0-9]{10}"
           placeholder="0821234567"
           required>

    <label for="product">
        Select Product Category
    </label>

    <select id="product"
            name="product"
            required>

        <option value="">
            Choose a Product
        </option>

        <option value="104.99">
            Fresh Food
        </option>

        <option value="1025">
            Clothing
        </option>

        <option value="150">
            Homeware
        </option>

    </select>

    <label for="quantity">
        Quantity
    </label>

    <input type="number"
           id="quantity"
           name="quantity"
           min="1"
           max="20"
           required>

    <label for="deliveryDate">
        Preferred Collection Date
    </label>

    <input type="date"
           id="deliveryDate"
           name="deliveryDate"
           required>

    <button type="submit">
        Check Availability
    </button>

</form>

<div id="responseMessage"></div>

    <div id="responseMessage"></div>

     </main>

     <!-- Footer section -->
       <footer>

      </footer>

</body>
</html>
